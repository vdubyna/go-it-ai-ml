apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: infra-tools
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mlflow
    targetRevision: 5.1.17
    helm:
      releaseName: mlflow
      valuesObject:
        global:
          security:
            allowInsecureImages: true
        image:
          repository: bitnamilegacy/mlflow
        gitImage:
          repository: bitnamilegacy/git
        waitContainer:
          image:
            repository: bitnamilegacy/os-shell
        tracking:
          enabled: true
          replicaCount: 1
          auth:
            enabled: false
          service:
            type: ClusterIP
            ports:
              http: 5000
          persistence:
            enabled: false
          resourcesPreset: "none"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1500m
              memory: 2Gi
        postgresql:
          enabled: false
        externalDatabase:
          dialectDriver: postgresql
          host: mlflow-postgres-postgresql.application.svc.cluster.local
          port: 5432
          user: mlflow
          password: mlflowpass
          database: mlflow
        minio:
          enabled: false
        externalS3:
          host: minio.application.svc.cluster.local
          port: 9000
          protocol: http
          bucket: mlflow-artifacts
          accessKeyID: minio
          accessKeySecret: minio123
          useCredentialsInSecret: false
          serveArtifacts: true
        run:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: application
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
  revisionHistoryLimit: 2
