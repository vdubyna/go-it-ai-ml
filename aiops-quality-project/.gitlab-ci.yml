stages:
  - retrain

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/aiops-quality-api"
  HELM_VALUES_FILE: "helm/values.yaml"

retrain-model:
  stage: retrain
  image: docker:26.1.4
  services:
    - name: docker:26.1.4-dind
      alias: docker
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: manual
  before_script:
    - apk add --no-cache git python3 py3-pip
    - docker info
  script:
    - |
      python3 model/train.py --output model/model.pkl --metadata model/metadata.json --version "$CI_PIPELINE_ID"
      export IMAGE_TAG="retrain-${CI_COMMIT_SHORT_SHA}-${CI_PIPELINE_ID}"

      docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
      docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
      docker push "$IMAGE_NAME:$IMAGE_TAG"

      sed -i "s|repository: .*|repository: \"$IMAGE_NAME\"|" "$HELM_VALUES_FILE"
      sed -i "s|tag: .*|tag: \"$IMAGE_TAG\"|" "$HELM_VALUES_FILE"

      git config user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
      git config user.name "${GITLAB_USER_NAME:-gitlab-ci}"
      git add model/model.pkl model/metadata.json "$HELM_VALUES_FILE"
      git commit -m "Retrain model ${IMAGE_TAG}" || echo "No retrain changes to commit"

      if [ -n "$GITLAB_TOKEN" ]; then
        git push "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:${CI_COMMIT_REF_NAME}"
      else
        echo "GITLAB_TOKEN is not set; skipping chart update push."
      fi
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - model/model.pkl
      - model/metadata.json
      - helm/values.yaml
